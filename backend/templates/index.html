<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMart | Backend Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900">
    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div
            class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mb-6 shadow-xl shadow-indigo-100">
            <span class="text-white font-black text-2xl">C</span>
        </div>
        <h1 class="text-4xl font-black tracking-tight mb-4 uppercase">Backend Preview Mode</h1>
        <p class="text-gray-500 max-w-md mb-8 font-medium">
            This is the Django-powered internal preview. For the full social experience, visit the production frontend.
        </p>
        <div class="flex gap-4">
            <a href="http://localhost:3000"
                class="px-6 py-3 bg-gray-900 text-white rounded-xl font-black text-xs uppercase tracking-widest hover:bg-indigo-600 transition-all">Go
                to CMart (3000)</a>
            <a href="/admin/"
                class="px-6 py-3 bg-white text-gray-900 border border-gray-200 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-gray-50 transition-all">Admin
                Panel</a>
        </div>
        <div class="mt-12 pt-8 border-t border-gray-100 w-full max-w-sm">
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-4">Latest System Drops</h2>
            <div id="quick-links" class="space-y-2">
                <a href="/shops/"
                    class="block p-3 bg-white rounded-xl border border-gray-100 text-xs font-bold hover:border-indigo-400 transition-colors">Browse
                    Shops</a>
                <a href="/products/"
                    class="block p-3 bg-white rounded-xl border border-gray-100 text-xs font-bold hover:border-indigo-400 transition-colors">View
                    All Products</a>
            </div>
        </div>
    </div>
</body>

</html>
